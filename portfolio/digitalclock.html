<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
<style>
    body{
        margin :0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;  
        background: url("https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=975&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
     background: cover;
     overflow: hidden;
    }
    h1{
        text-transform: uppercase;
        font-size: 50px;
        text-align: center;
        letter-spacing: 2px;
        color: white;
    }
    .clock{
 display: flex;
    }
    .clock div{
    margin:5px;
    position: relative;
    }
    .clock span{
        width: 100px;
        height: 80px;
        background-color: blueviolet;
        color: white;
        opacity: .8;
    display: flex;
    align-items: center;
    justify-content:center;
    font-size: 50px;
    }
    .clock .text{
       height: 30px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        background-color:darkblue ; 
        color: white;
        opacity: 0.5;
        }
        .clock #ampm{
        bottom: 0;
        position: absolute;
        width: 50px;
        height: 30px;
        font-size: 10px;
        
        background-color: rgb(0, 255, 85);
        color: white;
          
        }
</style>
</head>
<body>
    <h1> Digital clock</h1>
    <div class="clock">
  <div>
    <span id="hour">00</span>
    <span class="text">hours</span>
  </div>
<div>
    <span id="minute">00</span>
    <span class="text">minutes</span>
  </div>
  <div>
    <span id="second">00</span>
    <span class="text">seconds</span>
  </div>
<div><span id="ampm">AM</span></div>
    </div>
    <script>
 const hou=document.getElementById("hour");
 const min=document.getElementById("minute");
 const sec=document.getElementById("second");
 const ampm=document.getElementById("ampm");

function clockupdate(){
    let h=new Date().getHours();
    let m=new Date().getMinutes();
    let s=new Date().getSeconds();
    let ampm="AM";
    if(h>12)
{
    h-=12;
    ampm="PM";}
if(h==0){
    h=12;
}


hou.innerText=h;
min.innerText=m;
sec.innerText=s;
ampm.innerText=ampm;    }
clockupdate();
setInterval(clockupdate,1000);
  </script>
</body>
</html>
