<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dynamic Calculator</title>
    <link rel="stylesheet" href="calcu.css">
</head>
<body>
  <main class="page-wrapper">
    <section class="calculator">
      <div class="calculator-top">
        <div class="title-row">
          <h1>Simple Calculator</h1>
        </div>

        <div class="display-panel">
          <div id="history" aria-live="polite"></div>
          <input id="display" readonly aria-label="Calculator display" value="0">
        </div>
      </div>

      <div id="keypad" class="keypad">
        <button class="btn clear" data-action="clear">C</button>
        <button class="btn delete" data-action="delete">⌫</button>
        <button class="btn operator" data-value="%">%</button>
        <button class="btn operator" data-value="/">÷</button>

        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn operator" data-value="*">×</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn operator" data-value="-">−</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn operator" data-value="+">+</button>

        <button class="btn" data-value="0">0</button>
        <button class="btn" data-value=".">.</button>
        <button class="btn equal" data-action="equals">=</button>
      </div>
    </section>
  </main>

  <script src="calcul.js"></script>
</body>
</html>
